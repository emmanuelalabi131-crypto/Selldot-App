<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selldot Pro Max</title><script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="https://js.paystack.co/v1/inline.js"></script><style>
body { margin:0; font-family: Arial; background:#111; color:white; }
.screen { display:none; height:100vh; overflow:auto; }
.active { display:block; }
.header { padding:20px; font-size:22px; color:gold; }
.card { background:#222; margin:15px; padding:20px; border-radius:15px; }
.msg { padding:10px; margin:5px; border-radius:10px; max-width:70%; }
.me { background:gold; color:black; margin-left:auto; }
.other { background:#333; }
input { width:100%; padding:12px; margin:10px 0; border-radius:10px; border:none; }
button { background:gold; border:none; padding:12px; border-radius:10px; width:100%; margin-top:10px; }
</style></head>
<body><div id="loginScreen" class="screen active">
  <div class="header">💎 Selldot</div>
  <div class="card">
    <input id="name" placeholder="Your Name">
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>
</div><div id="dashboard" class="screen">
  <div class="header">Dashboard</div>  <div class="card">
    <h3>Welcome <span id="username"></span></h3>
  </div>  <div class="card">
    <h3>Balance: ₦<span id="balance">0</span></h3>
    <button onclick="showScreen('withdraw')">Withdraw</button>
  </div>  <div class="card">
    <canvas id="chart"></canvas>
  </div>  <div class="card">
    <button onclick="showScreen('upload')">Upload</button>
    <button onclick="showScreen('chat')">Chat</button>
    <button onclick="showScreen('marketplace')">Marketplace</button>
    <button onclick="pay()">Add Money</button>
    <button onclick="logout()">Logout</button>
  </div>
</div><!-- UPLOAD --><div id="upload" class="screen">
  <div class="header">Upload</div>
  <div class="card">
    <input type="file" id="file">
    <button onclick="uploadFile()">Upload</button>
    <div id="uploadStatus"></div>
    <button onclick="showScreen('dashboard')">Back</button>
  </div>
</div><!-- CHAT --><div id="chat" class="screen">
  <div class="header">Chat</div>
  <div class="card">
    <div id="messages"></div>
    <input id="msg">
    <button onclick="sendMsg()">Send</button>
    <button onclick="showScreen('dashboard')">Back</button>
  </div>
</div><!-- MARKETPLACE --><div id="marketplace" class="screen">
  <div class="header">Marketplace</div>
  <div class="card">
    <input id="itemName" placeholder="Item name">
    <input id="itemPrice" placeholder="Price">
    <button onclick="addItem()">Add Item</button>
  </div>
  <div id="items"></div>
  <button onclick="showScreen('dashboard')">Back</button>
</div><!-- WITHDRAW --><div id="withdraw" class="screen">
  <div class="header">Withdraw</div>
  <div class="card">
    <input id="withdrawAmount" placeholder="Amount">
    <button onclick="withdraw()">Withdraw</button>
    <button onclick="showScreen('dashboard')">Back</button>
  </div>
</div><script>
const firebaseConfig = {
  apiKey: "AIzaSyCrWBpXn3rHH0eFii_F8kmnPHnx-rWxQg0",
  authDomain: "selldot-6801d.firebaseapp.com",
  projectId: "selldot-6801d",
  storageBucket: "selldot-6801d.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let currentUser = null;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function signup(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(user=>{
    currentUser = user.user;
    db.collection("users").doc(currentUser.uid).set({ name: name.value, email: email.value });
    showScreen('dashboard');
    loadUser();
  });
}

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(user=>{
    currentUser = user.user;
    showScreen('dashboard');
    loadUser();
  });
}

function loadUser(){
  db.collection("users").doc(currentUser.uid).get().then(doc=>{
    username.innerText = doc.data().name;
  });
  loadMarketplace();
  loadChart();
}

// ✅ FIXED UPLOAD (REAL)
function uploadFile(){
  let file = document.getElementById("file").files[0];

  if(!file){
    alert("Select file first");
    return;
  }

  let ref = storage.ref("uploads/" + Date.now() + "_" + file.name);

  uploadStatus.innerText = "Uploading...";

  ref.put(file).then(()=>{
    ref.getDownloadURL().then(url=>{

      db.collection("uploads").add({
        user: currentUser.uid,
        fileName: file.name,
        url: url
      });

      uploadStatus.innerText = "Upload successful";
    });
  }).catch(err=>{
    uploadStatus.innerText = "Error: " + err.message;
  });
}

// CHAT
function sendMsg(){
  db.collection("messages").add({ text: msg.value, user: currentUser.uid });
  msg.value="";
}

db.collection("messages").onSnapshot(snap=>{
  let html="";
  snap.forEach(d=>{
    let m=d.data();
    let cls = m.user===currentUser?.uid?"msg me":"msg other";
    html+=`<div class='${cls}'>${m.text}</div>`;
  });
  messages.innerHTML=html;
});

// MARKETPLACE
function addItem(){
  db.collection("marketplace").add({ name:itemName.value, price:itemPrice.value });
}

function loadMarketplace(){
  db.collection("marketplace").onSnapshot(snap=>{
    let html="";
    snap.forEach(d=>{
      let i=d.data();
      html+=`<div class='card'>${i.name} - ₦${i.price}</div>`;
    });
    items.innerHTML=html;
  });
}

// CHART
function loadChart(){
  db.collection("payments").where("user","==",currentUser.uid)
  .onSnapshot(snap=>{
    let data=[];
    snap.forEach(d=> data.push(d.data().amount));

    new Chart(document.getElementById("chart"),{
      type:'line',
      data:{ labels:data.map((_,i)=>i+1), datasets:[{data:data}] }
    });
  });
}

// WITHDRAW
function withdraw(){
  db.collection("withdrawals").add({
    user: currentUser.uid,
    amount: withdrawAmount.value,
    status:"pending"
  });
  alert("Request sent");
}

// PAYSTACK
function pay(){
  PaystackPop.setup({
    key:'pk_test_9b805c9720db4c01ef1e229121e9ea4f90319b24',
    email: auth.currentUser.email,
    amount: 5000*100,
    callback:function(){
      db.collection("payments").add({ user: currentUser.uid, amount:5000 });
      balance.innerText = parseInt(balance.innerText) + 5000;
    }
  }).openIframe();
}

function logout(){ auth.signOut(); showScreen('loginScreen'); }
</script></body>
</html>
